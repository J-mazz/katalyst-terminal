name: CI (C/C++ — Fedora/GCC)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Parallelism for cmake --build
  CMAKE_BUILD_PARALLEL_LEVEL: "2"
  # Set to 1 to hard-fail on compiler warnings.
  WERROR: "0"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest          # host runner — the real OS is the container below
    container:
      image: fedora:latest
      options: --privileged         # needed for forkpty() in PTY tests

    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:

          - name: gcc-debug + tests
            build_type: Debug
            extra_cxxflags: "-O0 -g3 -fno-omit-frame-pointer"
            run_cppcheck: false
            run_gcc_analyzer: false

          - name: gcc-release
            build_type: Release
            extra_cxxflags: "-O2 -g"
            run_cppcheck: false
            run_gcc_analyzer: false

          - name: gcc-asan-ubsan
            build_type: RelWithDebInfo
            extra_cxxflags: "-O1 -g -fno-omit-frame-pointer -fsanitize=address,undefined -fno-sanitize-recover=all"
            run_cppcheck: false
            run_gcc_analyzer: false

          - name: gcc-analyzer + cppcheck
            build_type: Debug
            extra_cxxflags: "-O0 -g -fanalyzer"
            run_cppcheck: true
            run_gcc_analyzer: true

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Dependencies
      # -----------------------------------------------------------------------
      - name: Install build dependencies
        run: |
          dnf install -y \
            cmake \
            gcc-c++ \
            make \
            ninja-build \
            pkg-config \
            qt6-qtbase-devel \
            qt6-qtbase-private-devel \
            vulkan-headers \
            vulkan-loader-devel \
            kf6-kconfig-devel \
            glslang \
            cppcheck \
            git \
            ca-certificates \
            python3

      # -----------------------------------------------------------------------
      # 2. Configure
      # -----------------------------------------------------------------------
      - name: Configure (CMake)
        run: |
          WERROR_FLAG=""
          if [[ "${WERROR}" == "1" ]]; then
            WERROR_FLAG="-Werror"
          fi

          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_FLAGS="${{ matrix.extra_cxxflags }} -Wall -Wextra ${WERROR_FLAG}" \
            -DCMAKE_C_FLAGS="-Wall -Wextra ${WERROR_FLAG}"

      # -----------------------------------------------------------------------
      # 3. Build
      # -----------------------------------------------------------------------
      - name: Build
        run: cmake --build build --verbose

      # -----------------------------------------------------------------------
      # 4. Test
      # -----------------------------------------------------------------------
      - name: Test (ctest)
        run: |
          cd build
          ctest --output-on-failure --timeout 60

      # -----------------------------------------------------------------------
      # 5. Static analysis — cppcheck (optional per matrix row)
      # -----------------------------------------------------------------------
      - name: Run cppcheck
        if: ${{ matrix.run_cppcheck }}
        run: |
          cppcheck \
            --enable=all \
            --inconclusive \
            --force \
            --inline-suppr \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=missingInclude \
            src/

      # -----------------------------------------------------------------------
      # 6. Upload logs
      # -----------------------------------------------------------------------
      - name: Upload build logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.name }}
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
            build/Testing/Temporary/LastTest.log
            build/**/*.log
          if-no-files-found: ignore